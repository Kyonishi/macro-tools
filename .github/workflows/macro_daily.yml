name: Macro Data Daily Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - backfill

jobs:
  update-macro-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance supabase pandas requests

      - name: Run daily update
        if: github.event.inputs.mode != 'backfill'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python macro_fetcher.py daily

      - name: Run backfill (manual only)
        if: github.event.inputs.mode == 'backfill'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python macro_fetcher.py backfill 10y
